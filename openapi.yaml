openapi: 3.0.3
info:
  title: Salestio API
  description: |
    Summarizes a cart and converts line amounts using exchange rates from
    [Open Exchange Rates](https://openexchangerates.org/).

    Rates are cached in the database and refreshed hourly via a scheduled task.

    The cart summary endpoint returns `501 Not Implemented` until request/response
    contracts are defined.
  version: 0.2.0
servers:
  - url: https://salestio.tenorium.local
    description: Local Docker (TLS)
paths:
  /api/cart/summary:
    post:
      operationId: summarizeCart
      summary: Summarize cart and convert currencies
      description: |
        Stub — implementation pending.

        Supported currencies (minimum): USD, EUR, JPY.
      responses:
        '501':
          description: Not implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotImplemented'
components:
  schemas:
    NotImplemented:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Not implemented
